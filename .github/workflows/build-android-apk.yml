name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "android/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build APK
        run: gradle -p android :app:assembleDebug

      - name: Prepare APK artifact
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SafeWalk-Intelligence.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeWalk-Intelligence-apk
          path: SafeWalk-Intelligence.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view android-latest >/dev/null 2>&1 || gh release create android-latest --title "SafeWalk Android APK" --notes "Latest installable SafeWalk Intelligence Android APK."
          gh release upload android-latest SafeWalk-Intelligence.apk --clobber
